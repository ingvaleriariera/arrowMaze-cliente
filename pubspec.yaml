name: arrow_maze_cliente_copy
description: Arrow Maze - Escape Puzzle game client.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  dio: ^5.3.0
  sqflite: ^2.3.0
  flutter_secure_storage: ^9.0.0
  just_audio: ^0.9.34
  shared_preferences: ^2.2.0
  go_router: ^14.0.0
  flutter_localizations:
    sdk: flutter
  local_auth: ^2.1.0
  ditredi: ^2.0.2

dev_dependencies:
  test: ^1.25.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/audio/Pyromania.mp3
    - assets/audio/success.mp3
    - assets/audio/fiasco.mp3
